networks:
  zabbix-network:
    name: zabbix_default
  wazuh-network:
    name: single-node_default
    external: true

services:
  zabbix-db:
    image: mysql:8.0
    container_name: zabbix-db
    environment:
      - MYSQL_ROOT_PASSWORD=zabbix_root
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=zabbix_pass
    volumes:
      - zabbix_db_data:/var/lib/mysql
    networks:
      - zabbix-network
    restart: unless-stopped

  zabbix-server:
    image: zabbix/zabbix-server-mysql:ubuntu-7.0-latest
    container_name: zabbix-server
    environment:
      - DB_SERVER_HOST=zabbix-db
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=zabbix_pass
      - MYSQL_ROOT_PASSWORD=zabbix_root
    ports:
      - "10051:10051"
    depends_on:
      - zabbix-db
    networks:
      - zabbix-network
      - wazuh-network
    restart: unless-stopped

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:ubuntu-7.0-latest
    container_name: zabbix-web
    environment:
      - DB_SERVER_HOST=zabbix-db
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=zabbix_pass
      - ZBX_SERVER_HOST=zabbix-server
      - PHP_TZ=Africa/Algiers
    ports:
      - "8090:8080"
    depends_on:
      - zabbix-db
      - zabbix-server
    networks:
      - zabbix-network
    restart: unless-stopped

volumes:
  zabbix_db_data:
